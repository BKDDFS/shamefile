name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-wheels:
    name: Build wheel ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: auto
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_2
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            manylinux: musllinux_1_2
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build wheel with maturin
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --locked --out dist
          manylinux: ${{ matrix.manylinux }}
          sccache: "true"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  test-wheels:
    name: Smoke test ${{ matrix.name }} (py${{ matrix.python }})
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        python: ["3.12", "3.13", "3.14"]
        include:
          - name: linux-x64-glibc
            os: ubuntu-latest
          - name: linux-x64-musl
            os: ubuntu-latest
          - name: linux-arm64-glibc
            os: ubuntu-24.04-arm
          - name: macos-arm64
            os: macos-latest
          - name: macos-x64
            os: macos-15-intel
          - name: windows-x64
            os: windows-latest
    steps:
      - name: Set up Python
        if: matrix.name != 'linux-x64-musl'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}

      - name: Download all wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: wheels
          pattern: "wheel-*"
          merge-multiple: true

      - name: Extract version from tag
        id: version
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install wheel and smoke test (host)
        if: matrix.name != 'linux-x64-musl'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --only-binary=:all: --find-links=wheels shamefile
          actual=$(shame --version)
          echo "shame --version -> ${actual}"
          if ! echo "${actual}" | grep -qF "${VERSION}"; then
            echo "::error::shame --version '${actual}' does not contain expected ${VERSION}"
            exit 1
          fi
          shame --help >/dev/null

      - name: Install wheel and smoke test (docker)
        if: matrix.name == 'linux-x64-musl'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DOCKER_IMAGE: python:${{ matrix.python }}-alpine
        run: |
          set -euo pipefail
          docker run --rm -v "$(pwd)/wheels:/wheels:ro" -e VERSION "${DOCKER_IMAGE}" sh -eu -c '
            python -m pip install --upgrade pip --quiet
            python -m pip install --only-binary=:all: --find-links=/wheels shamefile --quiet
            actual=$(shame --version)
            echo "shame --version -> ${actual}"
            if ! echo "${actual}" | grep -qF "${VERSION}"; then
              echo "::error::shame --version ${actual} does not contain expected ${VERSION}"
              exit 1
            fi
            shame --help >/dev/null
          '

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist, test-wheels]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all PyPI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: "{wheel-*,sdist}"
          merge-multiple: true

      - name: Publish to PyPI (Trusted Publishing + attestations)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          attestations: true
